<!DOCTYPE html>
<html>
<head>
    <title>Hospital Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Hospital Management System</span>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="mb-4 text-center">Admin Dashboard</h2>

    <div class="row">

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h4>Total Patients</h4>
                    <h2>{{ patient_count }}</h2>
                    <p>Manage patient records</p>
                    <a href="/patients" class="btn btn-primary">Manage Patients</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h4>Total Doctors</h4>
                    <h2>{{ doctor_count }}</h2>
                    <p>Manage doctor details</p>
                    <a href="/doctors" class="btn btn-success">Manage Doctors</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h4>Total Appointments</h4>
                    <h2>{{ appointment_count }}</h2>
                    <p>Book and view appointments</p>
                    <a href="/appointments" class="btn btn-warning">Appointments</a>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
