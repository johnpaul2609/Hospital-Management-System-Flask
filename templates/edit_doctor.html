<!DOCTYPE html>
<html>
<head>
    <title>Edit Doctor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-body">

            <h3>Edit Doctor</h3>

            <form method="POST">

                <input type="text"
                       name="name"
                       class="form-control mb-3"
                       value="{{ doctor[1] }}"
                       required>

                <input type="text"
                       name="specialization"
                       class="form-control mb-3"
                       value="{{ doctor[2] }}"
                       required>

                <input type="text"
                       name="phone"
                       class="form-control mb-3"
                       value="{{ doctor[3] }}"
                       required>

                <input type="text"
                       name="experience"
                       class="form-control mb-3"
                       value="{{ doctor[4] }}"
                       required>

                <button class="btn btn-success">
                    Update Doctor
                </button>

            </form>

        </div>
    </div>

</div>

</body>
</html>
