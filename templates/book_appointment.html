<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-body">

            <h3 class="text-center mb-4">Book Appointment</h3>

            <form method="POST">

                <label>Select Patient</label>
                <select name="patient_name" class="form-control mb-3" required>
                    <option value="">-- Select Patient --</option>

                    {% for p in patients %}
                    <option value="{{ p[1] }}">
                        {{ p[1] }} - Age: {{ p[2] }} - {{ p[5] }}
                    </option>
                    {% endfor %}
                </select>

                <label>Select Doctor</label>
                <select name="doctor_name" class="form-control mb-3" required>
                    <option value="">-- Select Doctor --</option>

                    {% for d in doctors %}
                    <option value="{{ d[1] }}">
                        {{ d[1] }} - {{ d[2] }} - {{ d[4] }} Experience
                    </option>
                    {% endfor %}
                </select>

                <label>Appointment Date</label>
                <input type="date" name="appointment_date" class="form-control mb-3" required>

                <button type="submit" class="btn btn-success w-100">
                    Book Appointment
                </button>

            </form>

            <br>
            <a href="/appointments" class="btn btn-secondary w-100">Back</a>

        </div>
    </div>
</div>

</body>
</html>
