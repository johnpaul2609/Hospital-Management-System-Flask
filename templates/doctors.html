<!DOCTYPE html>
<html>
<head>
    <title>Doctors</title>
</head>
<body>

<h2>Doctor List</h2>

<a href="/add_doctor">Add New Doctor</a>
<br><br>

<table border="1" cellpadding="10">
    <tr class="table-primary">
    <th>ID</th>
    <th>Name</th>
    <th>Specialization</th>
    <th>Phone</th>
    <th>Experience</th>
    <th>Action</th>
</tr>

    {% for d in doctors %}
    <tr>
    <td>{{ d[0] }}</td>
    <td>{{ d[1] }}</td>
    <td>{{ d[2] }}</td>
    <td>{{ d[3] }}</td>
    <td>{{ d[4] }}</td>
    <td>
        <a href="/edit_doctor/{{ d[0] }}" class="btn btn-warning btn-sm">Edit</a>

        <a href="/delete_doctor/{{ d[0] }}"
           class="btn btn-danger btn-sm"
           onclick="return confirm('Delete this doctor?')">
           Delete
        </a>
    </td>
</tr>
    {% endfor %}
</table>

<br>
<a href="/dashboard">Back to Dashboard</a>

</body>
</html>
