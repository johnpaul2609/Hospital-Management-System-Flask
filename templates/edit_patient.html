<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient</title>
</head>
<body>

<h2>Edit Patient</h2>

<form method="POST">

    <input type="text" name="name" value="{{ patient[1] }}" required>
    <br><br>

    <input type="number" name="age" value="{{ patient[2] }}" required>
    <br><br>

    <select name="gender">
        <option {% if patient[3] == "Male" %}selected{% endif %}>Male</option>
        <option {% if patient[3] == "Female" %}selected{% endif %}>Female</option>
    </select>
    <br><br>

    <input type="text" name="phone" value="{{ patient[4] }}" required>
    <br><br>

    <input type="text" name="disease" value="{{ patient[5] }}" required>
    <br><br>

    <button type="submit">Update Patient</button>

</form>

<br>
<a href="/patients">Back</a>

</body>
</html>
