<!DOCTYPE html>
<html>
<head>
    <title>Add Patient</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">Add Patient</span>
        <a href="/patients" class="btn btn-light">Back</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 500px;">
        <div class="card-body">

            <h3 class="text-center mb-4">Patient Details</h3>

            <form method="POST">
                <input type="text" name="name" class="form-control mb-3" placeholder="Patient Name" required>

                <input type="number" name="age" class="form-control mb-3" placeholder="Age" required>

                <select name="gender" class="form-control mb-3">
                    <option>Male</option>
                    <option>Female</option>
                </select>

                <input type="text" name="phone" class="form-control mb-3" placeholder="Phone Number" required>

                <input type="text" name="disease" class="form-control mb-3" placeholder="Disease" required>

                <button type="submit" class="btn btn-success w-100">Save Patient</button>
            </form>

        </div>
    </div>
</div>

</body>
</html>
