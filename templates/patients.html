<!DOCTYPE html>
<html>
<head>
    <title>Patients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">Patient Management</span>
        <a href="/dashboard" class="btn btn-light">Dashboard</a>
    </div>
</nav>
<form method="GET" class="mb-3">
    <div class="row">
        <div class="col-md-4">
            <input
                type="text"
                name="search"
                class="form-control"
                placeholder="Search Patient"
                value="{{ search }}">
        </div>

        <div class="col-md-2">
            <button class="btn btn-primary">
                Search
            </button>
        </div>
    </div>
</form>
<div class="container mt-5">

    <div class="d-flex justify-content-between mb-3">
        <h2>Patient List</h2>
        <div>
            <a href="/add_patient" class="btn btn-success">
                Add New Patient
            </a>

            <a href="/export_patients" class="btn btn-primary">
                Export Excel
            </a>
        </div>
    </div>

    <table class="table table-bordered table-hover shadow bg-white">
        <tr class="table-primary">
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Phone</th>
            <th>Disease</th>
            <th>Action</th>
        </tr>

        {% for p in patients %}
        <tr>
            <td>{{ p[0] }}</td>
            <td>{{ p[1] }}</td>
            <td>{{ p[2] }}</td>
            <td>{{ p[3] }}</td>
            <td>{{ p[4] }}</td>
            <td>{{ p[5] }}</td>
            <td>
                <a href="/edit_patient/{{ p[0] }}" class="btn btn-warning btn-sm">Edit</a>
                <a href="/delete_patient/{{ p[0] }}" 
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure?')">
                   Delete
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
